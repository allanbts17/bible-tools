<app-modal-template
  #modal
  [title]="title"
  (modalDidPresent)="modalPresented()"
  (closedEvent)="resetValues()"
>
  <swiper-container
    #swiperRef
    allow-touch-move="false"
    (afterinit)="swiperInit()"
    class="h-full"
  >
    <swiper-slide class="h-full">
      <div class="overflow-y-scroll h-full w-full">
        <ion-list class="w-full">
          @for (book of bookList; track book; let last = $last) {
          <ion-item
            [lines]="last ? 'none' : 'full'"
            (click)="setBook(book)"
            button
          >
            <ion-label>{{ book.name }}</ion-label>
          </ion-item>
          }
        </ion-list>
      </div>
    </swiper-slide>

    <swiper-slide class="h-full w-full">
      @if (chapterList?.length > 0) {
      <div class="h-full w-full overflow-y-scroll">
        <div class="flex flex-wrap">
          @for (chapter of chapterList; track chapter) {
          <ion-button
            class="h-20 chapter-item"
            shape="round"
            color="medium"
            fill=""
            (click)="setChapter(chapter)"
          >
            {{ chapter.number }}
          </ion-button>
          }
        </div>
        <div class="h-20 w-full"></div>
      </div>
      } @else {
      <!-- <div class="flex flex-wrap justify-around h-full overflow-y-scroll">
        <ion-item class="mt-9" lines="none">
          <ion-spinner name="circles"></ion-spinner>
        </ion-item>
      </div> -->
      <app-spinner></app-spinner>
      }
    </swiper-slide>
  </swiper-container>

  @if (showFab) {
  <ion-fab
    [ngClass]="{
      animate__bounceInUp: $safeNavigationMigration(slides?.activeIndex) == 1,
      animate__backOutDown: $safeNavigationMigration(slides?.activeIndex) == 0
    }"
    class="animate__animated"
    vertical="bottom"
    horizontal="start"
    slot="fixed"
    (click)="returnToPrev()"
  >
    <ion-fab-button color="medium">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  }
</app-modal-template>
